name: Merge Stack — Start
on:
  pull_request:
    types: [labeled]
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: merge-stack-${{ github.event.pull_request.number }}
  cancel-in-progress: false
defaults:
  run:
    shell: bash
jobs:
  propagate:
    name: Propagate merge-stack label and enable auto-merge
    # Only act on human-applied `merge-stack` labels on non-fork PRs.
    # The sender check prevents this workflow from recursively re-firing
    # when it labels the next PR down the stack itself.
    if: >-
      github.event.label.name == 'merge-stack' && github.event.sender.type == 'User' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GHA_PAT_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Walk base chain and label each PR down to main
        id: walk
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          while :; do
            base="$(gh pr view "$pr" --repo "$REPO" --json baseRefName -q .baseRefName)"
            if [[ "$base" == "main" ]]; then
              echo "bottom=$pr" >> "$GITHUB_OUTPUT"
              break
            fi
            next="$(gh pr list --repo "$REPO" --state open --head "$base" \
              --json number -q '.[0].number')"
            if [[ -z "$next" ]]; then
              echo "::error::Could not find an open PR for branch '$base'; stack is broken."
              exit 1
            fi
            gh pr edit "$next" --repo "$REPO" --add-label merge-stack
            pr="$next"
          done
      - name: Enable auto-merge on bottom PR
        env:
          BOTTOM: ${{ steps.walk.outputs.bottom }}
        run: |
          set -euo pipefail
          # Idempotent: `gh pr merge --auto` returns "Merge already in
          # progress" if auto-merge is already enabled. Treat that as
          # success so retries don't fail.
          if ! out=$(gh pr merge "$BOTTOM" --repo "$REPO" --squash --auto 2>&1); then
            if [[ "$out" == *"Merge already in progress"* ]]; then
              echo "Auto-merge already enabled on PR #$BOTTOM."
            else
              echo "$out" >&2
              exit 1
            fi
          fi
