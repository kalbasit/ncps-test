name: Merge Stack — Continue
on:
  pull_request:
    types: [closed]
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: merge-stack-continue-${{ github.repository }}
  cancel-in-progress: false
defaults:
  run:
    shell: bash
jobs:
  restack-and-advance:
    name: Restack remaining stack and enable next auto-merge
    if: >-
      github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'merge-stack') && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GHA_PAT_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Compute remaining labeled chain (bottom→top)
        id: chain
        env:
          MERGED_PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          # Explicitly exclude the just-merged PR. `--state open` should
          # already filter it out, but GitHub's API can briefly report a
          # merged PR as still open due to eventual consistency, and that
          # was breaking the chain walk below.
          gh pr list --repo "$REPO" --state open --label merge-stack \
            --json number,headRefName,baseRefName \
            -q ".[] | select(.number != $MERGED_PR_NUMBER and .headRefName != \"$MERGED_HEAD_REF\") | [.number, .headRefName, .baseRefName] | @tsv" \
            > /tmp/labeled.tsv

          if [[ ! -s /tmp/labeled.tsv ]]; then
            echo "No remaining merge-stack PRs; nothing to do."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          declare -A num_by_head base_by_head
          while IFS=$'\t' read -r num head base; do
            num_by_head[$head]="$num"
            base_by_head[$head]="$base"
          done < /tmp/labeled.tsv

          # Bottom = a labeled head whose base is not another labeled head
          # (i.e. its base is `main` after GitHub's auto-retarget).
          bottom_head=""
          for head in "${!num_by_head[@]}"; do
            base="${base_by_head[$head]}"
            if [[ -z "${num_by_head[$base]:-}" ]]; then
              bottom_head="$head"
              break
            fi
          done

          if [[ -z "$bottom_head" ]]; then
            echo "::error::Could not find a bottom of the labeled chain (cycle?). labeled.tsv:"
            cat /tmp/labeled.tsv
            exit 1
          fi

          # Walk bottom→top, emitting "<head>\t<base>" per row.
          : > /tmp/chain.tsv
          cur="$bottom_head"
          top_head=""
          while [[ -n "$cur" ]]; do
            printf '%s\t%s\n' "$cur" "${base_by_head[$cur]}" >> /tmp/chain.tsv
            top_head="$cur"
            next=""
            for h in "${!num_by_head[@]}"; do
              if [[ "${base_by_head[$h]}" == "$cur" ]]; then
                next="$h"
                break
              fi
            done
            cur="$next"
          done

          if [[ -z "$top_head" ]]; then
            echo "::error::Chain walk produced an empty top_head."
            exit 1
          fi

          {
            echo "found=true"
            echo "top_head=$top_head"
            echo "bottom_num=${num_by_head[$bottom_head]}"
          } >> "$GITHUB_OUTPUT"
          echo "----- chain.tsv -----"
          cat /tmp/chain.tsv
      - uses: actions/checkout@v6
        if: steps.chain.outputs.found == 'true'
        with:
          token: ${{ secrets.GHA_PAT_TOKEN }}
          ref: ${{ steps.chain.outputs.top_head }}
          fetch-depth: 0
      - name: Configure git identity
        if: steps.chain.outputs.found == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
      - name: Rebase remaining stack onto main and force-push
        id: restack
        if: steps.chain.outputs.found == 'true'
        env:
          # The merged PR's pre-merge HEAD SHA — this is the cut-point for
          # rebasing the new bottom: every commit AFTER this in the next
          # branch is "the new bottom's own work", which we want to replay
          # onto main (dropping the now-squash-merged ancestor commits).
          MERGED_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Walk the chain bottom→top. For each branch:
          #   1. Fetch its current remote tip.
          #   2. `git rebase --onto <new-base> <prev-old-tip>` — this takes
          #      commits in the current branch that came AFTER prev-old-tip
          #      and replays them onto new-base. That cleanly drops the
          #      ancestor branch's pre-squash commits (for the bottom) or
          #      the previous branch's pre-rebase commits (for the rest).
          #   3. Force-push with --force-with-lease=<head>:<remote-old-tip>,
          #      so we only overwrite the remote if it's still at the SHA
          #      we just fetched (protecting against concurrent pushes).
          #
          # Same commits gs would produce; no Nix install needed; doesn't
          # touch the git-spice navigation comment.
          prev_old_tip="$MERGED_PR_HEAD_SHA"
          new_base="main"
          # main is only on the remote after checkout; create local main.
          git branch -f main origin/main
          count=0
          while IFS=$'\t' read -r head _base; do
            git fetch --no-tags origin "$head"
            this_old_tip="$(git rev-parse "refs/remotes/origin/$head")"

            # `-B` creates or resets the branch at the given SHA. Works
            # whether or not the branch already exists locally (the top
            # one was set up by actions/checkout, the others weren't).
            git checkout -B "$head" "$this_old_tip"

            git rebase --onto "$new_base" "$prev_old_tip"

            git push --force-with-lease="$head:$this_old_tip" \
              origin "HEAD:refs/heads/$head"

            prev_old_tip="$this_old_tip"
            new_base="$head"
            count=$((count + 1))
          done < /tmp/chain.tsv

          echo "Restacked and pushed $count branches."
      - name: On failure — strip labels and comment
        if: failure() && steps.restack.outcome == 'failure'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mapfile -t nums < <(gh pr list --repo "$REPO" --state open \
            --label merge-stack --json number -q '.[].number')
          for n in "${nums[@]}"; do
            gh pr edit "$n" --repo "$REPO" --remove-label merge-stack || true
            gh pr comment "$n" --repo "$REPO" --body \
              "Automated stack merge failed during the rebase step. The \`merge-stack\` label has been removed from all PRs in the stack. Please resolve conflicts locally, push, and re-apply the label on the top-most PR to retry. Run: $RUN_URL"
          done
          exit 1
      - name: Enable auto-merge on new bottom
        if: success() && steps.chain.outputs.found == 'true'
        run: |
          set -euo pipefail
          new_bottom="$(gh pr list --repo "$REPO" --state open \
            --label merge-stack --base main \
            --json number -q '.[0].number')"
          if [[ -z "$new_bottom" ]]; then
            echo "No labeled PR targeting main remains — stack fully merged."
            exit 0
          fi
          # Idempotent: `gh pr merge --auto` returns "Merge already in
          # progress" if auto-merge is already enabled. Treat that as
          # success so retries don't fail.
          if ! out=$(gh pr merge "$new_bottom" --repo "$REPO" --squash --auto 2>&1); then
            if [[ "$out" == *"Merge already in progress"* ]]; then
              echo "Auto-merge already enabled on PR #$new_bottom."
            else
              echo "$out" >&2
              exit 1
            fi
          fi
