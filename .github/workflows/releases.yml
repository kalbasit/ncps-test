name: Releases
on:
  push:
    tags:
      - "v*.*.*"
jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Release with Notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: "true"
